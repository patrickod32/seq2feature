<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="p" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#9A8F77"/></marker>
  </defs>
  <rect width="820" height="400" fill="#FFFFFF"/>
  <text x="40" y="30" font-size="16" font-weight="700" fill="#33302A">What the app does to your text</text>
  <text x="40" y="50" font-size="12.5" fill="#8B8273">the per-token matrix is the faithful object; buckets are a readability layer on top.</text>

  <!-- text -->
  <rect x="24" y="204" width="90" height="52" rx="8" fill="#fff" stroke="#C9BFA9"/><text x="69" y="234" font-size="13" fill="#33302A" text-anchor="middle">text</text>
  <path d="M114,230 H146" stroke="#9A8F77" stroke-width="1.6" fill="none" marker-end="url(#p)"/>

  <!-- matrix -->
  <rect x="148" y="170" width="214" height="124" rx="10" fill="#FBFAF5" stroke="#DDD4C3" stroke-width="1.5"/>
  <text x="255" y="192" font-size="12.5" font-weight="700" fill="#A84D2E" text-anchor="middle">score EVERY token</text>
  <text x="255" y="286" font-size="11.5" fill="#8B8273" text-anchor="middle">per-token × per-latent</text>
  <g>
    <!-- row 0 --><circle cx="178" cy="214" r="5" fill="#BF5A38"/><circle cx="203" cy="214" r="5" fill="#E6E0D2"/><circle cx="228" cy="214" r="5" fill="#E6E0D2"/><circle cx="253" cy="214" r="5" fill="#BF5A38"/><circle cx="278" cy="214" r="5" fill="#E6E0D2"/><circle cx="303" cy="214" r="5" fill="#6E9A6F"/><circle cx="328" cy="214" r="5" fill="#E6E0D2"/>
    <!-- row 1 --><circle cx="178" cy="236" r="5" fill="#E6E0D2"/><circle cx="203" cy="236" r="5" fill="#E6E0D2"/><circle cx="228" cy="236" r="5" fill="#BF5A38"/><circle cx="253" cy="236" r="5" fill="#E6E0D2"/><circle cx="278" cy="236" r="5" fill="#E6E0D2"/><circle cx="303" cy="236" r="5" fill="#E6E0D2"/><circle cx="328" cy="236" r="5" fill="#6E9A6F"/>
    <!-- row 2 --><circle cx="178" cy="258" r="5" fill="#E6E0D2"/><circle cx="203" cy="258" r="5" fill="#6E9A6F"/><circle cx="228" cy="258" r="5" fill="#E6E0D2"/><circle cx="253" cy="258" r="5" fill="#E6E0D2"/><circle cx="278" cy="258" r="5" fill="#BF5A38"/><circle cx="303" cy="258" r="5" fill="#E6E0D2"/><circle cx="328" cy="258" r="5" fill="#E6E0D2"/>
  </g>

  <!-- fan arrows -->
  <g stroke="#9A8F77" stroke-width="1.6" fill="none" marker-end="url(#p)">
    <path d="M362,232 C400,232 400,121 426,121"/>
    <path d="M362,232 H426"/>
    <path d="M362,232 C400,232 400,345 426,345"/>
  </g>

  <!-- three views -->
  <rect x="428" y="96"  width="216" height="50" rx="8" fill="#EFF3EC" stroke="#BCD0BD"/><text x="536" y="126" font-size="13" fill="#33302A" text-anchor="middle">pool → span top-k</text>
  <rect x="428" y="208" width="216" height="50" rx="8" fill="#FBFAF5" stroke="#DDD4C3"/><text x="536" y="238" font-size="13" fill="#33302A" text-anchor="middle">segment → concept buckets</text>
  <rect x="428" y="320" width="216" height="50" rx="8" fill="#F7ECE6" stroke="#E0C3B5"/><text x="536" y="350" font-size="13" fill="#33302A" text-anchor="middle">scatter → token ↔ latent</text>

  <!-- merge arrows -->
  <g stroke="#9A8F77" stroke-width="1.6" fill="none" marker-end="url(#p)">
    <path d="M644,121 C672,121 672,232 686,232"/>
    <path d="M644,233 H686"/>
    <path d="M644,345 C672,345 672,232 686,232"/>
  </g>

  <!-- display -->
  <rect x="688" y="172" width="108" height="120" rx="10" fill="#EFF3EC" stroke="#BCD0BD" stroke-width="1.5"/>
  <text x="742" y="222" font-size="13" fill="#33302A" text-anchor="middle">display</text>
  <text x="742" y="244" font-size="12" fill="#8B8273" text-anchor="middle">+ Claude</text>
  <text x="742" y="260" font-size="12" fill="#8B8273" text-anchor="middle">judge</text>
</svg>
